#cloud-config
# Cloud-init config. Proxmox passes this to the VM at first boot.

users:
  - name: admin

    # Sudo group gives admin privileged commands, needed for
    # Ansible's "become: true".
    groups: sudo

    shell: /bin/bash

    # Skips the sudo password prompt. Alternative is a vault-
    # stored password — extra moving part. SSH keys already gate the account.
    sudo: ['ALL=(ALL) NOPASSWD:ALL']

    ssh_authorized_keys:
      - ${sanjar_key}
      - ${jim_key}

# Updates the apt cache before any install runs.
package_update: true

# Upgrades every installed package. Picks up fixes published
# since the template image was built.
package_upgrade: true

packages:
  - ansible
  - git
  - python3-pip

# Clones the repo so the playbook is on disk before login.
# "sudo -u admin" makes admin own the cloned files. Default in runcmd is root.
runcmd:
  - sudo -u admin git clone https://github.com/sanjarbsaraee/its25-virt-automation.git /home/admin/its25-virt-automation
  - sudo -u admin ansible-galaxy collection install -r /home/admin/its25-virt-automation/ansible/collections/requirements.yml