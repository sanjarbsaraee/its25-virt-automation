#cloud-config
# Cloud-init config. Proxmox passes this to the VM at first boot.

users:
  - name: admin
    groups: sudo  # Required for Ansible's "become: true".
    shell: /bin/bash
    # No sudo password prompt. SSH keys already gate access.
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${sanjar_key}
      - ${jim_key}

# Picks up fixes released since the template was built.
package_update: true
package_upgrade: true

packages:
  - ansible
  - git
  - python3-pip

# Clones the repo so the playbook is on disk before login.
# "sudo -u admin" because runcmd defaults to root.
runcmd:
  - sudo -u admin git clone https://github.com/sanjarbsaraee/its25-virt-automation.git /home/admin/its25-virt-automation
  - sudo -u admin ansible-galaxy collection install -r /home/admin/its25-virt-automation/ansible/collections/requirements.yml