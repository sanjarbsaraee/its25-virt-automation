# Ansible reads ansible.cfg from the working directory. Settings here
# apply to every play. Section names mirror the subsystems they
# configure.

[defaults]
# "inventory" tells Ansible where to find the host list. A path here
# saves typing -i on every command. The prod folder leaves room for
# staging in iter 2.
inventory               = inventories/prod

# "host_key_checking" controls SSH host key verification. False skips
# the prompt. True (default) blocks on first connect. VMs rebuild
# often in iter 1, so false.
host_key_checking       = False

# "stdout_callback = yaml" prints task output as YAML. Default is a
# JSON-ish blob. YAML reads better when a task fails.
stdout_callback         = yaml

# "interpreter_python" pins Python on managed hosts. Auto-discovery
# warns on every run. Pinning silences the warning.
interpreter_python      = /usr/bin/python3

# "collections_path" tells Ansible where to find Galaxy collections.
# A relative path here keeps installs isolated to this project,
# not in the user's home directory. Default is ~/.ansible/collections.
collections_path        = ./collections

# "roles_path" tells Ansible where to find roles. Default looks
# in ./roles next to the playbook. We run ansible-playbook from
# ansible/, so a relative ./roles points to ansible/roles/.
roles_path              = ./roles

[ssh_connection]
# "pipelining" reuses one SSH connection per task. Default opens a
# new one each task. Pipelining runs roughly twice as fast.
pipelining              = True