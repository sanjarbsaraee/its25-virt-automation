# Settings for all plays. Loaded from the directory where
# ansible-playbook runs.

[defaults]
# Saves typing -i on every command.
inventory               = inventories/prod

# VMs rebuild often and change host keys, so skip the
# SSH trust prompt.
host_key_checking       = False

# YAML reads better than the default JSON blob,
# especially when a task fails.
stdout_callback         = yaml

# Skips auto-discovery, avoids ambiguity when several
# Python versions exist on a host.
interpreter_python      = /usr/bin/python3

# Keeps installs inside the repo instead of the default
# ~/.ansible/collections.
collections_path        = ./collections

# Relative to the ansible/ directory where playbooks run.
roles_path              = ./roles

[ssh_connection]
# Sends modules through the SSH session instead of copying
# temp files. Roughly halves run time.
pipelining              = True