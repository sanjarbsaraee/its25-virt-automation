# Configuration for ansible-playbook. Read from the directory
# ansible-playbook runs in. Settings apply to every play.

[defaults]
# Path to host list. Saves -i on every command.
inventory               = inventories/prod

# Skips SSH "trust this host?" prompt. True blocks on first
# connect. VMs rebuild often, so false.
host_key_checking       = False

# Formats task output. YAML reads better than the default
# JSON-ish blob, especially when a task fails.
stdout_callback         = yaml

# Pins Python on managed hosts. Skips discovery — faster and
# unambiguous if a host has several versions.
interpreter_python      = /usr/bin/python3

# Where Ansible looks for Galaxy collections. Relative path
# keeps installs in the repo, not in ~/.ansible/collections.
collections_path        = ./collections

# Where Ansible looks for roles. Relative to where playbook
# runs, which is the ansible/ directory.
roles_path              = ./roles

[ssh_connection]
# Reuses one SSH connection per task instead of opening a new
# one. Roughly halves run time.
pipelining              = True