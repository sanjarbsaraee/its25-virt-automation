# Verifies the control-node has Ansible, Git and Python ready
# before iter 2+ uses it to push tasks to other VMs.

# cloud-init runs first-boot setup. We wait so later tasks
# never race against an unfinished system.
- name: Wait for cloud-init to finish
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  timeout: 60

# Ansible's ping confirms SSH, Python, and modules work.
# Not an ICMP ping.
- name: Confirm Python and connectivity
  ansible.builtin.ping:

# ansible_version is a built-in. We register as ansible_cli
# to avoid shadowing it.
- name: Capture Ansible version
  ansible.builtin.command: ansible --version
  changed_when: false
  register: ansible_cli

- name: Show Ansible version
  ansible.builtin.debug:
    msg: "{{ ansible_cli.stdout_lines | first }}"

- name: Capture Git version
  ansible.builtin.command: git --version
  changed_when: false
  register: git_version

- name: Show Git version
  ansible.builtin.debug:
    msg: "{{ git_version.stdout_lines | first }}"

# Filters mounts for "/" and reads its free space.
# ansible_facts comes from gather_facts in site.yml.
- name: Show disk space on root
  ansible.builtin.debug:
    msg: >-
      Root has {{ ansible_facts.mounts
        | selectattr('mount', 'eq', '/')
        | map(attribute='size_available')
        | first | human_readable }} free.

- name: Show identity
  ansible.builtin.debug:
    msg: "Running as {{ ansible_user_id }} on {{ ansible_hostname }}."