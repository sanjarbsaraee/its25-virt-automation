# Tasks that verify the control-node is ready to run Ansible playbooks
# against managed nodes. Runs on the control-node only. Iter 2+
# extends this with checks for new tools as they get added.

# "command" runs a raw shell command. Use it when no module fits.
# cloud-init blocks the play until first-boot setup finishes,
# so a later task never races against an unfinished system.
- name: Wait for cloud-init to finish
  ansible.builtin.command: cloud-init status --wait
  changed_when: false
  timeout: 60

# "ping" is Ansible's connectivity check. It confirms SSH works,
# Python runs, and modules execute. Not an ICMP ping.
- name: Confirm Python and connectivity
  ansible.builtin.ping:

    # "register" stores task output in a variable. We use ansible_cli
    # not ansible_version because ansible_version is Ansible's own
    # built-in variable. The collision shadows our registered value.
- name: Capture Ansible version
  ansible.builtin.command: ansible --version
  changed_when: false
  check_mode: false
  register: ansible_cli

# Use default in case the command still returns empty output
- name: Show Ansible version
  ansible.builtin.debug:
    msg: "{{ ansible_cli.stdout_lines[0] | default('Unknown') if
      ansible_cli.stdout_lines is defined and ansible_cli.stdout_lines else
      'Unknown' }}"

- name: Capture Git version
  ansible.builtin.command: git --version
  changed_when: false
  check_mode: false
  register: git_version

- name: Show Git version
  ansible.builtin.debug:
    msg: "{{ git_version.stdout_lines[0] | default('Unknown') if
      git_version.stdout_lines is defined and git_version.stdout_lines else
      'Unknown' }}"

# ansible_facts populates from gather_facts in the play. No
# command needed since the facts are already collected.
- name: Show disk space on root
  ansible.builtin.debug:
    msg: >-
      Root has {{ ansible_facts.mounts
        | selectattr('mount', 'eq', '/')
        | map(attribute='size_available')
        | first | human_readable }} free.

- name: Show identity
  ansible.builtin.debug:
    msg: "Running as {{ ansible_user_id }} on {{ ansible_hostname }}."
