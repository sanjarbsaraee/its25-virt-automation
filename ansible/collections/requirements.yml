# Third-party Ansible packages installed by cloud-init at
# first boot. Pinned so a new release cannot break a build.

collections:
  # Looks up secrets from Infisical when the playbook runs,
  # keeps credentials out of playbooks.
  - name: infisical.vault
    version: "1.1.4"

  # Manages databases, users, access rules and privileges on PostgreSQL.
  - name: community.postgresql
    version: "4.2.0"