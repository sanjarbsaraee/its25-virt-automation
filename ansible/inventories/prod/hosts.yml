# Group names map to plays in site.yml. Plays target a
# group, not individual hosts.

all:
  children:
    control_nodes:
      hosts:
        # "local" bypasses SSH and runs tasks directly on
        # this machine, where the playbook already runs.
        control-node:
          ansible_connection: local

    # Placeholder for iter 2. Empty groups have no effect.
    web:
      hosts: {}
    db:
      hosts: {}