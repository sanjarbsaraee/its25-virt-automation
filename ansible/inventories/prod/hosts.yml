# Hosts grouped by role. Plays target a group by name.

all:
  children:
    control_nodes:
      hosts:
        # Runs tasks on the same machine as ansible-playbook.
        # Default ssh would loop over the network back to itself.
        control-node:
          ansible_connection: local

    # Reserved for iter 2. Ansible drops empty groups at parse time,
    # so these have no runtime effect — they exist as documentation.
    web:
      hosts: {}
    db:
      hosts: {}