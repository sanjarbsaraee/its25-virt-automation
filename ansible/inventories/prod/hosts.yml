---
# Inventory uses YAML format and groups hosts by role. Group names
# match what playbooks target with hosts: foo. Iter 2 keeps the
# structure and only adds hosts.

all:
  children:
    control_nodes:
      hosts:
        # "ansible_connection = local" runs tasks on the same machine
        # as ansible-playbook. The default ssh connects over the
        # network. Local skips the round trip, so local.
        control-node:
          ansible_connection: local

    # Empty groups reserved for iter 2. Listed now so iter 2 adds
    # hosts, not rewrites the inventory.
    web:
      hosts: {}
    db:
      hosts: {}